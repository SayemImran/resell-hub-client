<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f8faff" />
            <stop offset="100%" stop-color="#eef3ff" />
        </linearGradient>
        
        <radialGradient id="ambientLight" cx="50%" cy="40%" r="60%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
            <stop offset="60%" stop-color="#f4f7fe" stop-opacity="0.8" />
            <stop offset="100%" stop-color="#e3ecfc" stop-opacity="0.6" />
        </radialGradient>

        <pattern id="isometricGrid" width="120" height="69.28" patternUnits="userSpaceOnUse">
            <path d="M 60 0 L 120 34.64 L 60 69.28 L 0 34.64 Z" fill="none" stroke="#e1e8f5" stroke-width="1" opacity="0.6"/>
            <path d="M 60 0 L 60 69.28" fill="none" stroke="#e1e8f5" stroke-width="0.5" opacity="0.4"/>
        </pattern>

        <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
